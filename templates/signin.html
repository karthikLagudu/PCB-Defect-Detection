<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Sign in to the PCB defect detection workspace.">
	<title>Sign in | PCB Vision</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="static/assets/css/fontawesome.min.css">
	<link rel="stylesheet" href="static/assets/css/modern-ui.css">
	<script src="static/assets/js/modern-ui.js"></script>
</head>
<body class="ui-auth-page">
	<a class="ui-skip-link" href="#auth-form">Skip to sign in</a>
	<main class="ui-auth-shell ui-reveal" data-reveal="soft">
		<aside class="ui-auth-aside" aria-label="PCB Vision introduction">
			<a class="ui-auth-brand" href="/" aria-label="PCB Vision home">
				<span class="ui-auth-brand__mark" aria-hidden="true"><i class="fas fa-search"></i></span>
				<span>PCB Vision</span>
			</a>
			<div class="ui-auth-aside__content">
				<h1>Inspect with clarity.</h1>
				<p>Access the detection workspace to analyze board imagery and review inspection resources in one focused interface.</p>
			</div>
			<span class="ui-auth-aside__meta">Visual inspection workspace</span>
		</aside>

		<section class="ui-auth-main">
			<form id="auth-form" class="ui-auth-form" action="/signin" method="GET">
				<header class="ui-auth-form__header">
					<h2>Welcome back</h2>
					<p>Enter your account details to continue.</p>
				</header>

				<div class="ui-field">
					<label for="login">Username</label>
					<input type="text" id="login" name="user" placeholder="Enter your username" autocomplete="username" required>
				</div>

				<div class="ui-field">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
				</div>

				<button class="ui-button ui-button--block" type="submit">Sign in</button>
				<p class="ui-auth-switch">New to PCB Vision? <a href="/logon">Create an account</a></p>
			</form>
		</section>
	</main>
</body>
</html>
