<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Verify your PCB Vision account.">
	<title>Verify account | PCB Vision</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="static/assets/css/fontawesome.min.css">
	<link rel="stylesheet" href="static/assets/css/modern-ui.css">
	<script src="static/assets/js/modern-ui.js"></script>
</head>
<body class="ui-auth-page">
	<a class="ui-skip-link" href="#auth-form">Skip to verification</a>
	<main class="ui-auth-shell ui-reveal" data-reveal="soft">
		<aside class="ui-auth-aside" aria-label="Account verification information">
			<a class="ui-auth-brand" href="/" aria-label="PCB Vision home">
				<span class="ui-auth-brand__mark" aria-hidden="true"><i class="fas fa-shield-alt"></i></span>
				<span>PCB Vision</span>
			</a>
			<div class="ui-auth-aside__content">
				<h1>One quick check.</h1>
				<p>Verify the code sent to your email to secure your account and finish setup.</p>
			</div>
			<span class="ui-auth-aside__meta">Secure account verification</span>
		</aside>

		<section class="ui-auth-main">
			<form id="auth-form" class="ui-auth-form" action="{{ url_for('predict1') }}" method="POST">
				<header class="ui-auth-form__header">
					<h2>Enter verification code</h2>
					<p>Check your email and enter the one-time code below.</p>
				</header>

				<div class="ui-field">
					<label for="message">Verification code</label>
					<input type="text" id="message" name="message" placeholder="Enter your code" autocomplete="one-time-code" inputmode="numeric" required autofocus>
				</div>

				<button class="ui-button ui-button--block" type="submit">Verify account</button>
				<p class="ui-auth-switch"><a href="/logon">Back to account setup</a></p>
			</form>
		</section>
	</main>
</body>
</html>
